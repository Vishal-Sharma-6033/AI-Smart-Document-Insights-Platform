server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — let React Router handle client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Docker's embedded DNS — lets nginx re-resolve the backend IP at runtime
  # so a backend rebuild/recreate doesn't leave us with a stale cached IP (502).
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Proxy API + uploads to the backend service (Docker network DNS name).
  location /api/ {
    set $backend_upstream backend;
    proxy_pass http://$backend_upstream:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    set $backend_uploads backend;
    proxy_pass http://$backend_uploads:5000;
  }

  # Cache static assets aggressively.
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }
}
